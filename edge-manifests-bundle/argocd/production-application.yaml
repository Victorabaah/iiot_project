apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: edge-app-production
  namespace: argocd
  labels:
    app.kubernetes.io/name: edge-app
    environment: production
spec:
  project: edge-platform

  source:
    # Edit to your actual GitOps repo
    repoURL: https://github.com/Victorabaah/iiot_project.git
    targetRevision: main
    path: overlays/production

  destination:
    server: https://kubernetes.default.svc
    namespace: edge-system

  # For highly controlled production, you may remove 'automated'
  # and sync manually after approval/change window validation.
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
